# docker-compose.dev.yml — Dev override (hot reload + volume mount)
# Dùng: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  api:
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level debug
    volumes:
      - .:/app
    environment:
      DEBUG: "true"
      LOG_LEVEL: DEBUG
