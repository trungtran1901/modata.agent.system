  # ── Agent API ─────────────────────────────────────────────
  api-agent:
    image: 192.168.100.43:5000/modata.agent.system:0.0.1
    container_name: modata-agent-api
    restart: unless-stopped
    env_file: .env
    environment:
      PG_HOST: postgres
    ports:
      - "8006:8000"
    networks:
      - modata-ai
    extra_hosts:
      - "mongo-node1:192.168.100.103"
      - "mongo-node2:192.168.100.104"
      - "mongo-node3:192.168.100.105"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

networks:
  modata-ai:
    driver: bridge
    ipam:
      config:
        - subnet: "173.20.0.0/16"
