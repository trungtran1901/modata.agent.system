services:

  # ── PostgreSQL (session store) ────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: modata-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${PG_USER:-admin}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-change_me}
      POSTGRES_DB:       ${PG_DATABASE:-vectordb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-admin} -d ${PG_DATABASE:-vectordb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Agent API ─────────────────────────────────────────────
  api:
    build: .
    container_name: modata-agent-api
    restart: unless-stopped
    env_file: .env
    environment:
      PG_HOST: postgres
      # MCP_GATEWAY_URL trỏ đến modata-mcp đang chạy bên ngoài
      # Ghi đè ở đây nếu cần, hoặc để trong .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:

networks:
  default:
    name: modata-agent-network
